# @package _global_
# Acoustic case 5: supercardioid (dipole + long quadrupole)
# Reference: kinet/experiments/acoustic/case5_supercardioid

defaults:
  - override /solver: acoustic
  - override /equilibrium: entropic
  - override /lattice: d2q9

experiment:
  name: acoustic_case5_supercardioid
  initial_conditions: acoustic_uniform
  spatial_shape: [700, 700]
  dt: 1.0
  t_max: 5000.0
  log_interval: 100
  save_interval: 50
  plot_interval: 200
  plot_fields: [rho, u]
  output_variables: [rho, u]
  obstacles: []
  sources:
    - kind: dipole
      position: [350, 350]
      amplitude: 0.044
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: quadrupole
      position: [350, 350]
      amplitude: 0.15
      frequency: 0.121
      direction: [1.0, 0.0]

solver:
  rho_0: 1.0
  tau: 0.501

boundary:
  x:
    low: periodic
    high: periodic
  y:
    low: periodic
    high: periodic
  absorbing:
    x_low:
      width: 50
      sigma_max: 0.3
    x_high:
      width: 50
      sigma_max: 0.3
    y_low:
      width: 50
      sigma_max: 0.3
    y_high:
      width: 50
      sigma_max: 0.3
