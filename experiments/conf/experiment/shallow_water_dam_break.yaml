# @package _global_
# Shallow water dam break
# Reference: kinet/experiments/shallow_water/test_run

defaults:
  - override /solver: shallow_water
  - override /equilibrium: polynomial
  - override /lattice: d2q9

experiment:
  name: shallow_water_dam_break
  initial_conditions: shallow_water_dam_break
  spatial_shape: [128, 128]
  dt: 1.0
  t_max: 5000.0
  log_interval: 100
  save_interval: 50
  plot_interval: 100
  plot_fields: [rho, u]
  output_variables: [rho, u]
  obstacles: []
  sources: []
  perturbation_radius: 5
  perturbation_amplitude: 0.5

solver:
  gravity: 0.0714
  height_0: 1.0
  Fr: 0.1
  Re: 1000.0
  char_length: 128.0

boundary:
  x:
    low: periodic
    high: periodic
  y:
    low: periodic
    high: periodic
