# @package _global_
# Taylor-Green vortex 3D (D3Q27)
# Reference: kinet/experiments/taylor_green_vortex/3d_q27

defaults:
  - override /solver: isothermal
  - override /equilibrium: entropic
  - override /lattice: d3q27

experiment:
  name: taylor_green_3d_q27
  initial_conditions: taylor_green_3d
  spatial_shape: [64, 64, 64]
  dt: 1.0
  t_max: 5000.0
  log_interval: 100
  save_interval: 100
  plot_interval: 500
  plot_fields: [rho, u]
  output_variables: [rho, u]
  obstacles: []
  sources: []

solver:
  Re: 1600.0
  Ma: 0.1
  char_length: 64.0

boundary:
  x:
    low: periodic
    high: periodic
  y:
    low: periodic
    high: periodic
  z:
    low: periodic
    high: periodic
