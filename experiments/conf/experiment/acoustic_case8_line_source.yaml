# @package _global_
# Acoustic case 8: line source (15 dipoles)
# Reference: kinet/experiments/acoustic/case8_line_source

defaults:
  - override /solver: acoustic
  - override /equilibrium: entropic
  - override /lattice: d2q9

experiment:
  name: acoustic_case8_line_source
  initial_conditions: acoustic_uniform
  spatial_shape: [1000, 300]
  dt: 1.0
  t_max: 5000.0
  log_interval: 100
  save_interval: 50
  plot_interval: 200
  plot_fields: [rho, u]
  output_variables: [rho, u]
  obstacles: []
  # 15 dipoles along y at x=500, spacing 20
  sources:
    - kind: dipole
      position: [500, 10]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 30]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 50]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 70]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 90]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 110]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 130]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 150]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 170]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 190]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 210]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 230]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 250]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 270]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
    - kind: dipole
      position: [500, 290]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]

solver:
  rho_0: 1.0
  tau: 0.501

boundary:
  x:
    low: periodic
    high: periodic
  y:
    low: periodic
    high: periodic
  absorbing:
    x_low:
      width: 50
      sigma_max: 0.3
    x_high:
      width: 50
      sigma_max: 0.3
