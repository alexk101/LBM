# @package _global_
# Acoustic case 9: moving quadrupole
# Reference: kinet/experiments/acoustic/case9_moving_quadrupole

defaults:
  - override /solver: acoustic
  - override /equilibrium: entropic
  - override /lattice: d2q9

experiment:
  name: acoustic_case9_moving_quad
  initial_conditions: acoustic_uniform
  spatial_shape: [600, 300]
  dt: 1.0
  t_max: 5000.0
  log_interval: 100
  save_interval: 50
  plot_interval: 200
  plot_fields: [rho, u]
  output_variables: [rho, u]
  obstacles: []
  sources:
    - kind: quadrupole
      position: [150, 150]
      amplitude: 0.01
      frequency: 0.121
      direction: [1.0, 0.0]
      velocity: [0.1, 0.0]
      start_time: 500.0

solver:
  rho_0: 1.0
  tau: 0.501

boundary:
  x:
    low: periodic
    high: periodic
  y:
    low: periodic
    high: periodic
  absorbing:
    x_low:
      width: 50
      sigma_max: 0.3
    x_high:
      width: 50
      sigma_max: 0.3
    y_low:
      width: 50
      sigma_max: 0.3
    y_high:
      width: 50
      sigma_max: 0.3
