# @package _global_
# Acoustic case 6: two monopoles
# Reference: kinet/experiments/acoustic/case6_two_monopoles

defaults:
  - override /solver: acoustic
  - override /equilibrium: entropic
  - override /lattice: d2q9

experiment:
  name: acoustic_case6_two_monopoles
  initial_conditions: acoustic_uniform
  spatial_shape: [700, 700]
  dt: 1.0
  t_max: 5000.0
  log_interval: 100
  save_interval: 50
  plot_interval: 200
  plot_fields: [rho, u]
  output_variables: [rho, u]
  obstacles: []
  sources:
    - kind: monopole
      position: [250, 350]
      amplitude: 0.1
      frequency: 0.181
    - kind: monopole
      position: [450, 350]
      amplitude: 0.1
      frequency: 0.181

solver:
  rho_0: 1.0
  tau: 0.501

boundary:
  x:
    low: periodic
    high: periodic
  y:
    low: periodic
    high: periodic
  absorbing:
    x_low:
      width: 50
      sigma_max: 0.3
    x_high:
      width: 50
      sigma_max: 0.3
    y_low:
      width: 50
      sigma_max: 0.3
    y_high:
      width: 50
      sigma_max: 0.3
